name: "CodeQL Calendr"

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
    types: [ opened, reopened, synchronize, ready_for_review ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    permissions:
      security-events: write
      packages: read

    uses: ./.github/workflows/codeql-shared.yml
    with:
      runner: macos-26
      language: swift
      build: |
        xcodebuild build -scheme Calendr \
        COMPILER_INDEX_STORE_ENABLE=NO CODE_SIGNING_ALLOWED=NO
